# =============================================================================
# ИИ-тьютор для СПО — Docker Compose (production)
# =============================================================================
# Запуск:
#   docker compose up -d
#
# С кастомным .env:
#   cp .env.docker.example .env && docker compose up -d
#
# GPU:
#   docker compose --profile gpu up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis — брокер сообщений и бэкенд результатов
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-tutor-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # FastAPI — веб-сервер
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tutor-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - model-data:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ---------------------------------------------------------------------------
  # Celery Worker — обработка асинхронных задач (загрузка модели, генерация)
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tutor-celery
    restart: unless-stopped
    command: >
      celery -A api.celery_app worker
        --loglevel=${CELERY_LOG_LEVEL:-INFO}
        --concurrency=1
        --max-tasks-per-child=10
        --without-heartbeat
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - model-data:/app/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 64G
          cpus: "8.0"

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  redis-data:
    driver: local
  model-data:
    driver: local

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  default:
    name: ai-tutor-net
    driver: bridge
